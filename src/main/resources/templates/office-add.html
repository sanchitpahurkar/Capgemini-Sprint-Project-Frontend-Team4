<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Office</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* Complying with the inline CSS provided in your reference code */
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --radius: 10px;
            --danger: #dc2626;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
        }

        .page-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        /* Card/Panel for Form */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }

        /* Input styling from reference */
        .form-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            height: 38px;
            font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-primary);
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            background: var(--bg);
        }

        /* Button styles from reference */
        .btn-add {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 38px;
            padding: 0 1.5rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-add:hover {
            background: #1d4ed8;
            color: #fff;
        }

        .btn-table {
            display: inline-flex;
            align-items: center;
            height: 38px;
            padding: 0 1.2rem;
            font-size: 0.82rem;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid var(--border);
            text-decoration: none;
            background: var(--surface);
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .btn-table:hover {
            border-color: var(--text-primary);
            background: var(--bg);
        }

        /* Alert Styling */
        .alert-custom {
            background: #fee2e2;
            color: var(--danger);
            border: 1px solid #fecaca;
            font-size: 0.82rem;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <nav aria-label="breadcrumb" class="mb-3">
        <p class="text-secondary" style="font-size: 0.75rem;">Offices / Add Office</p>
    </nav>

    <div class="page-header">
        <div>
            <h1 class="page-title">Add Office</h1>
            <p class="page-subtitle">Create a new office record in the catalog</p>
        </div>
        <a th:href="@{/offices}" class="btn-table">
            Back to List
        </a>
    </div>

    <div class="form-card shadow-sm">

        <div th:if="${errorMessage}" class="alert-custom">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/offices/add}" th:object="${office}" method="post">
            <div class="row g-4">

                <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control shadow-none" th:field="*{city}" required placeholder="e.g. San Francisco">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control shadow-none" th:field="*{phone}" required placeholder="+1 650 219 4782">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address Line 1</label>
                    <input type="text" class="form-control shadow-none" th:field="*{addressLine1}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address Line 2</label>
                    <input type="text" class="form-control shadow-none" th:field="*{addressLine2}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">State</label>
                    <input type="text" class="form-control shadow-none" th:field="*{state}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <input type="text" class="form-control shadow-none" th:field="*{country}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Postal Code</label>
                    <input type="text" class="form-control shadow-none" th:field="*{postalCode}" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Territory</label>
                    <input type="text" class="form-control shadow-none" th:field="*{territory}" required placeholder="e.g. NA, EMEA, APAC">
                </div>
            </div>

            <div class="mt-5 d-flex gap-2 border-top pt-4">
                <button type="submit" class="btn-add">
                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                    Save Office
                </button>
                <a th:href="@{/offices}" class="btn-table">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
