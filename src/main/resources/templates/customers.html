<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Management</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --danger: #dc2626;
            --success: #16a34a;
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
        }

        /* Top nav bar matching source */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
        }

        .topbar-nav a {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.15s;
        }

        .topbar-nav a.active { color: var(--accent); }

        /* Page layout */
        .page-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        /* Search panel */
        .search-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .search-panel input {
            flex: 1;
            height: 36px;
            font-size: 0.82rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 0.75rem;
            background: var(--bg);
            outline: none;
        }

        .btn-search {
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--text-primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-reset {
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        /* Add button */
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--accent);
            color: #fff !important;
            border-radius: 6px;
            text-decoration: none;
        }

        /* Table styling */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .data-table thead tr {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
        }

        .data-table tbody tr { border-bottom: 1px solid var(--border); }
        .data-table tbody tr:hover { background: #fafafa; }
        .data-table td { padding: 0.75rem 1rem; vertical-align: middle; }

        .mono { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text-secondary); }

        .btn-table {
            display: inline-flex;
            align-items: center;
            height: 28px;
            padding: 0 0.7rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 5px;
            border: 1px solid var(--border);
            text-decoration: none;
            background: var(--surface);
            color: var(--text-primary);
            margin-right: 4px;
        }

        .btn-table:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        /* Pagination */
        .pagination-bar {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .page-link-custom {
            min-width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--surface);
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0 10px;
        }

        .page-link-custom.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .page-link-custom.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div class="topbar">
    <span class="topbar-brand">CRM System</span>
    <nav class="topbar-nav">
        <a th:href="@{/customers}" class="active">Customers</a>
    </nav>
</div>

<div class="page-wrapper">

    <div class="page-header">
        <div>
            <h1 class="page-title">Customer Management</h1>
            <p class="page-subtitle">View and maintain customer records</p>
        </div>
        <a th:href="@{/customers/add}" class="btn-add">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            Add Customer
        </a>
    </div>

    <form th:action="@{/customers}" method="get" class="search-panel">
        <input type="text"
               name="keyword"
               placeholder="Search by name, city, or country..."
               th:value="${keyword}">
        <button class="btn-search" type="submit">Search</button>
        <a th:href="@{/customers}" class="btn-reset">Reset</a>
    </form>

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050">
        <div id="toast" class="toast align-items-center text-white border-0">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="table-card">
        <table class="data-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>City</th>
                <th>Country</th>
                <th>Credit Limit</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(customers)}">
                <td colspan="6" style="text-align:center; padding: 3rem; color: var(--text-secondary);">
                    No customers found
                </td>
            </tr>

            <tr th:each="c : ${customers}">
                <td><strong th:text="${c.customerName}"></strong></td>
                <td th:text="${c.contactName}"></td>
                <td th:text="${c.city}"></td>
                <td th:text="${c.country}"></td>
                <td class="mono" th:text="${c.creditLimit}"></td>
                <td>
                    <a th:href="@{/customers/edit/{id}(id=${c.customerNumber})}" class="btn-table">
                        Update
                    </a>
                    <a th:href="@{/customers/view/{id}(id=${c.customerNumber})}" class="btn-table" style="border-color: #e9d5ff; color: #7c3aed; background: #faf5ff;">
                        View
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination-bar" th:if="${totalPages > 0}">

            <a class="page-link-custom"
               th:classappend="${currentPage == 0} ? 'disabled'"
               th:href="@{/customers(page=${currentPage - 1}, keyword=${keyword})}">
                Prev
            </a>

            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a class="page-link-custom"
                   th:classappend="${i == currentPage} ? 'active'"
                   th:href="@{/customers(page=${i}, keyword=${keyword})}"
                   th:text="${i + 1}">
                </a>
            </th:block>

            <a class="page-link-custom"
               th:classappend="${currentPage == totalPages - 1} ? 'disabled'"
               th:href="@{/customers(page=${currentPage + 1}, keyword=${keyword})}">
                Next
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const toastEl = document.getElementById("toast");
        const toastBody = document.getElementById("toastBody");

        if (params.has("success")) {
            toastEl.classList.add("bg-success");
            if (params.get("success") === "created") {
                toastBody.innerText = "Customer added successfully";
            } else {
                toastBody.innerText = "Customer updated successfully";
            }
            new bootstrap.Toast(toastEl).show();
        }

        if (params.has("error")) {
            toastEl.classList.add("bg-danger");
            toastBody.innerText = decodeURIComponent(params.get("error"));
            new bootstrap.Toast(toastEl).show();
        }

        if (params.has("success") || params.has("error")) {
            window.history.replaceState({}, document.title, "/customers");
        }
    });
</script>
</body>
</html>
