<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Office</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* Complying with the inline CSS and inventory-theme.css tokens */
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --radius-lg: 12px;
            --danger: #dc2626;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            font-size: 14px;
        }

        .page-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        /* Form Card Styling from reference */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }

        .form-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            height: 38px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--bg);
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            background: #fff;
        }

        /* Read-only styling from theme.css */
        .form-control[readonly] {
            background: #f0f0ed;
            color: var(--text-secondary);
            cursor: not-allowed;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
        }

        /* Button styles from reference */
        .btn-save {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            height: 38px;
            padding: 0 1.5rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-table {
            display: inline-flex;
            align-items: center;
            height: 38px;
            padding: 0 1.2rem;
            font-size: 0.82rem;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid var(--border);
            text-decoration: none;
            background: var(--surface);
            color: var(--text-primary);
        }

        .alert-danger {
            background: #fee2e2;
            color: var(--danger);
            border: 1px solid #fecaca;
            font-size: 0.82rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <nav aria-label="breadcrumb" class="mb-3">
        <p class="text-secondary" style="font-size: 0.75rem;">Offices / Update Office</p>
    </nav>

    <div class="page-header">
        <div>
            <h1 class="page-title">Update Office</h1>
            <p class="page-subtitle">Modify existing branch details and location info</p>
        </div>
        <a th:href="@{/offices}" class="btn-table">
            Back to List
        </a>
    </div>

    <div class="form-card shadow-sm">

        <div th:if="${errorMessage}" class="alert alert-danger mb-4">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/offices/update/{officeCode}(officeCode=${office.officeCode})}"
              th:object="${office}"
              method="post">

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Office Code</label>
                    <input type="text" class="form-control shadow-none" th:field="*{officeCode}" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control shadow-none" th:field="*{city}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control shadow-none" th:field="*{phone}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address Line 1</label>
                    <input type="text" class="form-control shadow-none" th:field="*{addressLine1}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address Line 2</label>
                    <input type="text" class="form-control shadow-none" th:field="*{addressLine2}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">State</label>
                    <input type="text" class="form-control shadow-none" th:field="*{state}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <input type="text" class="form-control shadow-none" th:field="*{country}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Postal Code</label>
                    <input type="text" class="form-control shadow-none" th:field="*{postalCode}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Territory</label>
                    <input type="text" class="form-control shadow-none" th:field="*{territory}" required>
                </div>
            </div>

            <div class="mt-5 pt-4 border-top d-flex gap-2">
                <button type="submit" class="btn-save">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Save Changes
                </button>
                <a th:href="@{/offices}" class="btn-table">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
