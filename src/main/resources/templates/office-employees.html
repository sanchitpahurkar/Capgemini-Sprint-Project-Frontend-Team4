<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Office Employees</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* Integrating design tokens from inventory-theme.css */
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --radius-lg: 12px;
            --font-mono: 'DM Mono', monospace;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            font-size: 14px;
        }

        .page-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        /* Table & Card Container */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead tr {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            padding: 0.85rem 1.5rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .data-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .text-mono {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Pagination Styling from theme.css */
        .pagination-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .page-btn {
            min-width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.15s;
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Navigation Button */
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <nav aria-label="breadcrumb" class="mb-3">
        <p class="text-secondary" style="font-size: 0.75rem; margin: 0;">Offices / Employees</p>
    </nav>

    <div class="page-header">
        <div>
            <h1 class="page-title">Employees at Office</h1>
            <p class="text-secondary mt-1" style="font-size: 0.82rem;">
                Listing staff assigned to Office Code: <span class="fw-semibold text-dark" th:text="${officeCode}"></span>
            </p>
        </div>
        <a th:href="@{/offices}" class="btn-secondary">
            Back to Office List
        </a>
    </div>

    <div class="table-card">
        <table class="data-table">
            <thead>
            <tr>
                <th>Full Name</th>
                <th>Extension</th>
                <th>Email</th>
                <th>Job Title</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="4" class="text-center py-5 text-secondary">
                    <div style="font-size: 0.85rem;">No employees found for this office.</div>
                </td>
            </tr>

            <tr th:each="employee : ${employees}">
                <td class="fw-medium" th:text="${employee.fullName}">John Doe</td>
                <td class="text-mono" th:text="${employee.extension}">x102</td>
                <td class="text-mono text-accent" th:text="${employee.email}">john@classicmodels.com</td>
                <td>
                    <span class="badge bg-light text-dark border fw-normal" th:text="${employee.jobTitle}">Sales Rep</span>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination-bar">
            <a class="page-btn"
               th:if="${employeePage.hasPrevious}"
               th:href="@{/offices/{officeCode}/employees(officeCode=${officeCode}, page=${employeePage.currentPage - 1}, size=${size})}">
                &larr;
            </a>

            <div class="d-flex align-items-center gap-2 mx-2">
                <span class="text-secondary text-xs uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 0.05em;">Page</span>
                <span class="page-btn active" style="background: var(--accent); color: white; border-color: var(--accent);" th:text="${employeePage.currentPage + 1}">1</span>
                <span class="text-secondary text-xs uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 0.05em;">of</span>
                <span class="page-btn" th:text="${employeePage.totalPages}">5</span>
            </div>

            <a class="page-btn"
               th:if="${employeePage.hasNext}"
               th:href="@{/offices/{officeCode}/employees(officeCode=${officeCode}, page=${employeePage.currentPage + 1}, size=${size})}">
                &rarr;
            </a>
        </div>
    </div>
</div>

</body>
</html>
