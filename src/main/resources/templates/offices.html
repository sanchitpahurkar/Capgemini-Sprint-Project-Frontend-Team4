<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Office Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* Complying with the inline CSS provided in your reference code */
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
        }

        /* Page layout from reference */
        .page-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        /* Search panel from reference */
        .search-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .search-panel input, .search-panel select {
            height: 36px;
            font-size: 0.82rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            outline: none;
        }

        /* Buttons from reference */
        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn-search {
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--text-primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-table {
            display: inline-flex;
            align-items: center;
            height: 28px;
            padding: 0 0.7rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 5px;
            border: 1px solid var(--border);
            text-decoration: none;
            background: var(--surface);
            color: var(--text-primary);
        }

        .btn-table.btn-orders {
            border-color: #e9d5ff;
            color: #7c3aed;
            background: #faf5ff;
        }

        /* Table from reference */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            font-size: 0.82rem;
            margin-bottom: 0;
        }

        .data-table thead tr {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            padding: 0.7rem 1rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .data-table td.mono {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        /* Pagination from reference */
        .pagination-bar {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .page-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--surface);
            color: var(--text-secondary);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <nav aria-label="breadcrumb" class="mb-3">
        <p class="text-secondary" style="font-size: 0.75rem;">Offices / Offices</p>
    </nav>

    <div class="page-header">
        <div>
            <h1 class="page-title">Office Management</h1>
            <p class="page-subtitle">Browse and search office records</p>
        </div>
        <a th:href="@{/offices/add}" class="btn-add">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            Add Office
        </a>
    </div>

    <div class="search-panel">
        <form th:action="@{/offices}" method="get" class="row g-2 align-items-center">
            <input type="hidden" name="size" th:value="${size}">

            <div class="col-md-3">
                <select name="field" class="form-select shadow-none">
                    <option value="">Select Field...</option>
                    <option value="city" th:selected="${field == 'city'}">City</option>
                    <option value="state" th:selected="${field == 'state'}">State</option>
                    <option value="country" th:selected="${field == 'country'}">Country</option>
                    <option value="territory" th:selected="${field == 'territory'}">Territory</option>
                </select>
            </div>

            <div class="col-md-6">
                <input type="text" name="value" class="form-control shadow-none"
                       th:value="${value}"
                       placeholder="Type search value...">
            </div>

            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn-search w-100">Search</button>
                <a th:href="@{/offices(size=${size})}" class="btn btn-outline-secondary btn-sm d-flex align-items-center justify-content-center" style="height: 36px; border-radius: 6px; flex: 1;">Reset</a>
            </div>
        </form>
    </div>

    <div class="table-card shadow-sm">
        <table class="table data-table table-hover align-middle">
            <thead>
            <tr>
                <th>City</th>
                <th>Country</th>
                <th>Phone</th>
                <th>Territory</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(offices)}">
                <td colspan="5" class="text-center text-muted py-5">No office records found</td>
            </tr>

            <tr th:each="office : ${offices}">
                <td><strong th:text="${office.city}"></strong></td>
                <td th:text="${office.country}"></td>
                <td class="mono" th:text="${office.phone}"></td>
                <td><span class="badge bg-light text-dark border fw-normal" th:text="${office.territory}"></span></td>
                <td>
                    <div class="d-flex gap-2 justify-content-end">
                        <a class="btn-table"
                           th:href="@{/offices/view/{officeCode}(officeCode=${office.officeCode})}">
                            View
                        </a>
                        <a class="btn-table"
                           th:href="@{/offices/update/{officeCode}(officeCode=${office.officeCode})}">
                            Edit
                        </a>
                        <a class="btn-table btn-orders"
                           th:href="@{/offices/{officeCode}/employees(officeCode=${office.officeCode})}">
                            Employees
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination-bar" th:if="${officePage.totalPages > 1}">
            <a class="page-btn"
               th:if="${officePage.hasPrevious}"
               th:href="@{/offices(page=${officePage.currentPage - 1}, size=${size}, field=${field}, value=${value})}">
                &lt;
            </a>

            <span class="px-2 text-secondary fw-medium" style="font-size: 0.8rem;">
                Page <span th:text="${officePage.currentPage + 1}"></span> of <span th:text="${officePage.totalPages}"></span>
            </span>

            <a class="page-btn"
               th:if="${officePage.hasNext}"
               th:href="@{/offices(page=${officePage.currentPage + 1}, size=${size}, field=${field}, value=${value})}">
                &gt;
            </a>
        </div>
    </div>
</div>

</body>
</html>
