<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Office Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* Design tokens from inventory-theme.css */
        :root {
            --bg: #f7f7f5;
            --surface: #ffffff;
            --border: #e8e8e4;
            --text-primary: #1a1a18;
            --text-secondary: #6b6b66;
            --accent: #2563eb;
            --radius-lg: 12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            font-size: 14px;
        }

        .page-wrapper {
            max-width: 1100px; /* Narrower for better readability in details view */
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        /* Detail Card Layout */
        .details-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }

        .info-group {
            padding: 1.25rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 100%;
            transition: background 0.15s;
        }

        .info-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .text-mono {
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* Nav Button */
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            height: 36px;
            padding: 0 1.1rem;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-secondary:hover {
            border-color: #aaa;
            color: var(--text-primary);
            background: var(--bg);
        }

        .badge-territory {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <nav aria-label="breadcrumb" class="mb-3">
        <p class="text-secondary" style="font-size: 0.75rem; margin: 0;">Offices / Details</p>
    </nav>

    <div class="page-header">
        <div>
            <h1 class="page-title">Office Details</h1>
            <p class="page-subtitle">Detailed record view for the selected branch</p>
        </div>
        <a th:href="@{/offices}" class="btn-secondary">
            Back to List
        </a>
    </div>

    <div class="details-card shadow-sm">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="info-group">
                    <span class="info-label">Office Code</span>
                    <div class="info-value text-mono" th:text="${office.officeCode}">1</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="info-group">
                    <span class="info-label">City</span>
                    <div class="info-value" th:text="${office.city}">San Francisco</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="info-group">
                    <span class="info-label">Phone</span>
                    <div class="info-value text-mono" th:text="${office.phone}">+1 650 219 4782</div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-group">
                    <span class="info-label">Address Line 1</span>
                    <div class="info-value" th:text="${office.addressLine1}">100 Market Street</div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="info-group">
                    <span class="info-label">Address Line 2</span>
                    <div class="info-value" th:text="${office.addressLine2} ?: '-'">Suite 300</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-group">
                    <span class="info-label">State / Province</span>
                    <div class="info-value" th:text="${office.state} ?: '-'">CA</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-group">
                    <span class="info-label">Country</span>
                    <div class="info-value" th:text="${office.country}">USA</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-group">
                    <span class="info-label">Postal Code</span>
                    <div class="info-value text-mono" th:text="${office.postalCode}">94080</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-group">
                    <span class="info-label">Territory</span>
                    <div class="info-value">
                        <span class="badge-territory" th:text="${office.territory}">NA</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
